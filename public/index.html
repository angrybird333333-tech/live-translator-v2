<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時中泰語音翻譯</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea22,#764ba222);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px;}
.app{background:white;border-radius:20px;padding:28px 24px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.10);}

.top-bar{text-align:center;margin-bottom:22px;}
.top-bar h1{font-size:21px;font-weight:700;color:#1a1a1a;}
.top-bar p{font-size:12px;color:#aaa;margin-top:4px;}

/* 加入房間 */
.join-section{display:flex;flex-direction:column;gap:14px;margin-bottom:22px;}
.join-title{font-size:13px;font-weight:600;color:#555;text-align:center;}
.lang-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lang-card{border:2px solid #eee;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.15s;}
.lang-card.selected{border-color:#378ADD;background:#f0f7ff;}
.lang-card .flag{font-size:26px;margin-bottom:4px;}
.lang-card .name{font-size:13px;font-weight:600;color:#1a1a1a;}
.lang-card .sub{font-size:11px;color:#aaa;}

.room-row{display:flex;gap:8px;}
.room-input{flex:1;font-size:16px;padding:10px 14px;border-radius:12px;border:1.5px solid #eee;background:#fafafa;color:#1a1a1a;text-transform:uppercase;letter-spacing:3px;font-weight:700;text-align:center;}
.room-input:focus{outline:none;border-color:#378ADD;}
.join-btn{padding:10px 20px;border-radius:12px;border:none;background:#378ADD;color:white;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.join-btn:disabled{background:#ccc;cursor:not-allowed;}

.gen-btn{font-size:12px;color:#378ADD;background:none;border:none;cursor:pointer;text-align:center;padding:2px 0;}

/* 主翻譯畫面 */
.main-section{display:none;flex-direction:column;gap:14px;}

.room-badge{display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border-radius:12px;padding:10px 14px;}
.room-badge-left{display:flex;align-items:center;gap:8px;}
.room-code{font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:3px;}
.room-label{font-size:11px;color:#aaa;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;}
.online-dot.connected{background:#1D9E75;animation:blink 2s ease-in-out infinite;}
.online-count{font-size:12px;color:#aaa;}
.leave-btn{font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.my-panel{background:#f0f7ff;border:2px solid #378ADD;border-radius:16px;padding:16px;}
.their-panel{background:#fafafa;border:1.5px solid #eee;border-radius:16px;padding:16px;}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.panel-flag{font-size:20px;}
.panel-name{font-size:13px;font-weight:700;color:#1a1a1a;flex:1;}
.panel-role{font-size:10px;color:#aaa;}

.bubble{min-height:60px;word-break:break-word;}
.bubble-orig{font-size:12px;color:#aaa;font-style:italic;margin-bottom:4px;}
.bubble-trans{font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.5;}
.bubble-interim{font-size:14px;color:#aaa;font-style:italic;}
.ph{font-size:12px;color:#ccc;}

.mic-row{display:flex;justify-content:center;margin-top:4px;}
.mic-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;background:#378ADD;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 4px 12px rgba(55,138,221,0.3);}
.mic-btn.on{background:#E24B4A;animation:pulse 1.1s ease-in-out infinite;box-shadow:0 4px 12px rgba(226,75,74,0.4);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.35);}50%{box-shadow:0 0 0 12px rgba(226,75,74,0);}}

.status-bar{text-align:center;font-size:12px;color:#aaa;min-height:18px;}
.status-bar.err{color:#E24B4A;}
.status-bar.ok{color:#1D9E75;}

.rec-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#fff0f0;color:#a32d2d;padding:3px 10px;border-radius:20px;}
.dot-rec{width:6px;height:6px;border-radius:50%;background:#E24B4A;animation:dotblink 1s ease-in-out infinite;}
@keyframes dotblink{0%,100%{opacity:1}50%{opacity:0.2}}

.history{border-top:1px solid #eee;padding-top:12px;margin-top:4px;}
.history-hd{font-size:11px;color:#ccc;font-weight:600;margin-bottom:8px;}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.hi{background:#f9f9f9;border-radius:10px;padding:8px 12px;}
.hi-label{font-size:10px;color:#ccc;margin-bottom:2px;}
.hi-orig{font-size:12px;color:#aaa;}
.hi-trans{font-size:13px;color:#1a1a1a;font-weight:600;}

svg.icon{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>🎙 即時中泰語音翻譯</h1>
    <p>雙方各自開網頁，說話即時同步翻譯</p>
  </div>

  <!-- 加入房間 -->
  <div class="join-section" id="joinSection">
    <div class="join-title">選擇你的語言</div>
    <div class="lang-select">
      <div class="lang-card selected" id="cardZH" onclick="selectLang('zh')">
        <div class="flag">🇹🇼</div>
        <div class="name">我說中文</div>
        <div class="sub">翻譯成泰文給對方</div>
      </div>
      <div class="lang-card" id="cardTH" onclick="selectLang('th')">
        <div class="flag">🇹🇭</div>
        <div class="name">ฉันพูดไทย</div>
        <div class="sub">แปลเป็นจีนให้อีกฝ่าย</div>
      </div>
    </div>

    <div class="join-title" style="margin-top:4px;">輸入房間號碼</div>
    <div class="room-row">
      <input class="room-input" id="roomInput" maxlength="4" placeholder="ABCD" oninput="this.value=this.value.toUpperCase()">
      <button class="join-btn" onclick="joinRoom()" id="joinBtn">加入</button>
    </div>
    <button class="gen-btn" onclick="genRoom()">🎲 隨機產生房間號碼</button>
    <div class="status-bar" id="joinStatus">請選擇語言並輸入房間號碼</div>
  </div>

  <!-- 主翻譯畫面 -->
  <div class="main-section" id="mainSection">
    <div class="room-badge">
      <div class="room-badge-left">
        <div>
          <div class="room-label">房間號碼（傳給對方）</div>
          <div class="room-code" id="roomDisplay">----</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="online-dot" id="onlineDot"></span>
        <span class="online-count" id="onlineCount">等待對方加入...</span>
        <button class="leave-btn" onclick="leaveRoom()">離開</button>
      </div>
    </div>

    <!-- 我的面板 -->
    <div class="my-panel">
      <div class="panel-header">
        <div class="panel-flag" id="myFlag">🇹🇼</div>
        <div>
          <div class="panel-name" id="myName">我說中文</div>
          <div class="panel-role">我的說話 → 對方看到翻譯</div>
        </div>
      </div>
      <div class="bubble" id="myBubble"><span class="ph">按麥克風開始說話...</span></div>
      <div class="mic-row">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>

    <!-- 對方面板 -->
    <div class="their-panel">
      <div class="panel-header">
        <div class="panel-flag" id="theirFlag">🇹🇭</div>
        <div>
          <div class="panel-name" id="theirName">對方說泰文</div>
          <div class="panel-role">對方說話 → 我看到翻譯</div>
        </div>
      </div>
      <div class="bubble" id="theirBubble"><span class="ph">等待對方說話...</span></div>
    </div>

    <div class="status-bar" id="mainStatus"></div>

    <div class="history" id="histSec" style="display:none;">
      <div class="history-hd">對話紀錄</div>
      <div class="history-list" id="histList"></div>
    </div>
  </div>
</div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let myLang = 'zh';
let ws = null;
let recog = null;
let isListening = false;
let silTimer = null;
let finalTx = '';
let histArr = [];
let roomId = '';

function selectLang(lang) {
  myLang = lang;
  document.getElementById('cardZH').className = 'lang-card' + (lang==='zh' ? ' selected' : '');
  document.getElementById('cardTH').className = 'lang-card' + (lang==='th' ? ' selected' : '');
}

function genRoom() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('roomInput').value = code;
  setJoinStatus('房間號碼已產生，傳給對方後一起加入！', '');
}

function joinRoom() {
  const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if (code.length < 2) { setJoinStatus('請輸入至少2位房間號碼', 'err'); return; }
  if (!SR) { setJoinStatus('請使用 Chrome 瀏覽器', 'err'); return; }
  roomId = code;
  connectWS();
}

function connectWS() {
  setJoinStatus('連線中...', '');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room: roomId, lang: myLang }));
    showMain();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'room_info') {
      const dot = document.getElementById('onlineDot');
      const cnt = document.getElementById('onlineCount');
      dot.className = 'online-dot' + (msg.count >= 2 ? ' connected' : '');
      cnt.textContent = msg.count >= 2 ? `${msg.count} 人已連線 ✓` : '等待對方加入...';
    }
    if (msg.type === 'interim') {
      document.getElementById('theirBubble').innerHTML =
        `<div class="bubble-interim">💬 ${esc(msg.text)}</div>`;
    }
    if (msg.type === 'translation') {
      document.getElementById('theirBubble').innerHTML =
        `<div class="bubble-orig">${esc(msg.original)}</div><div class="bubble-trans">${esc(msg.translated)}</div>`;
      speak(msg.translated, msg.from === 'zh' ? 'th-TH' : 'zh-TW');
      addHist(msg.from === 'zh' ? '中文→泰文' : '泰文→中文', msg.original, msg.translated);
      setMainStatus('✓ 收到翻譯', 'ok');
      setTimeout(() => setMainStatus(''), 2000);
    }
  };

  ws.onclose = () => {
    setMainStatus('連線中斷，請重新整理', 'err');
  };

  ws.onerror = () => {
    setJoinStatus('連線失敗', 'err');
  };
}

function showMain() {
  document.getElementById('joinSection').style.display = 'none';
  const ms = document.getElementById('mainSection');
  ms.style.display = 'flex';
  document.getElementById('roomDisplay').textContent = roomId;

  const isZH = myLang === 'zh';
  document.getElementById('myFlag').textContent = isZH ? '🇹🇼' : '🇹🇭';
  document.getElementById('myName').textContent = isZH ? '我說中文' : 'ฉันพูดภาษาไทย';
  document.getElementById('theirFlag').textContent = isZH ? '🇹🇭' : '🇹🇼';
  document.getElementById('theirName').textContent = isZH ? '對方說泰文' : '對方說中文';
}

function leaveRoom() {
  stopMic();
  if (ws) { ws.close(); ws = null; }
  document.getElementById('joinSection').style.display = 'flex';
  document.getElementById('mainSection').style.display = 'none';
  document.getElementById('roomInput').value = '';
}

function toggleMic() {
  isListening ? stopMic() : startMic();
}

function startMic() {
  finalTx = '';
  recog = new SR();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = myLang === 'zh' ? 'zh-TW' : 'th-TH';

  recog.onstart = () => {
    isListening = true;
    const btn = document.getElementById('micBtn');
    btn.className = 'mic-btn on';
    btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>';
    setMainStatus('<span class="rec-badge"><span class="dot-rec"></span>錄音中...</span>', '');
  };

  recog.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTx += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const txt = (finalTx || '') + (interim ? `<span style="color:#aaa;font-style:italic;"> ${esc(interim)}</span>` : '');
    document.getElementById('myBubble').innerHTML = `<div class="bubble-orig">${txt}</div>`;

    // 傳送 interim 給對方
    if (interim && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'interim', text: interim }));
    }

    if (finalTx) {
      clearTimeout(silTimer);
      silTimer = setTimeout(() => {
        if (finalTx.trim()) doTranslate(finalTx.trim());
      }, 800);
    }
  };

  recog.onerror = (e) => {
    if (e.error === 'no-speech') return;
    setMainStatus('語音錯誤：' + e.error, 'err');
    stopMic();
  };

  recog.onend = () => { if (isListening) recog.start(); };
  recog.start();
}

function stopMic() {
  isListening = false;
  clearTimeout(silTimer);
  if (recog) { recog.onend = null; try { recog.stop(); } catch(e) {} recog = null; }
  const btn = document.getElementById('micBtn');
  btn.className = 'mic-btn';
  btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
  setMainStatus('');
}

async function doTranslate(text) {
  setMainStatus('翻譯中...', '');
  try {
    const isZH = myLang === 'zh';
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${isZH?'zh-TW':'th'}&tl=${isZH?'th':'zh-TW'}&dt=t&q=${encodeURIComponent(text)}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const translated = data[0].map(x => x[0]).join('');

    document.getElementById('myBubble').innerHTML =
      `<div class="bubble-orig">${esc(text)}</div><div class="bubble-trans">${esc(translated)}</div>`;

    // 傳送翻譯給對方
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'translation', original: text, translated }));
    }

    setMainStatus('✓ 已傳送給對方', 'ok');
    setTimeout(() => setMainStatus(isListening ? '<span class="rec-badge"><span class="dot-rec"></span>錄音中...</span>' : ''), 2000);
    addHist(isZH ? '中文→泰文' : '泰文→中文', text, translated);
    finalTx = '';
  } catch(e) {
    setMainStatus('翻譯失敗，請確認網路', 'err');
  }
}

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang; utt.volume = 1; utt.rate = 0.95;
  window.speechSynthesis.speak(utt);
}

function addHist(label, orig, trans) {
  histArr.unshift({ label, orig, trans });
  if (histArr.length > 30) histArr.pop();
  document.getElementById('histSec').style.display = '';
  document.getElementById('histList').innerHTML = histArr.map(h =>
    `<div class="hi"><div class="hi-label">${esc(h.label)}</div><div class="hi-orig">${esc(h.orig)}</div><div class="hi-trans">${esc(h.trans)}</div></div>`
  ).join('');
}

function setJoinStatus(msg, cls) {
  const el = document.getElementById('joinStatus');
  el.innerHTML = msg; el.className = 'status-bar' + (cls ? ' ' + cls : '');
}
function setMainStatus(msg, cls) {
  const el = document.getElementById('mainStatus');
  el.innerHTML = msg; el.className = 'status-bar' + (cls ? ' ' + cls : '');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
